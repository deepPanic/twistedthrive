<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ block "title" . }}{{ .Title }} — Twisted Thrive{{ end }}</title>
{{ block "style" . }}{{ partial "style.html" . }}{{ end }}
</head>
<body>
<div class="frame">
  <header class="site-header">
    <div class="brand">
      <a href="/">{{ site.Title }}</a>
      <small>Contemporary art space</small>
    </div>
    <nav>
      {{ $current := . }}
      {{ range site.Menus.main }}
        <a href="{{ .URL }}"{{ if or ($current.IsMenuCurrent "main" .) ($current.HasMenuCurrent "main" .) }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <span>© {{ now.Year }} Twisted Thrive</span>
    <span>thrive.localh0st.co.uk</span>
  </footer>
</div>
</body>
</html>
