<style>
  :root{
    color-scheme: dark;
    --bg: #070707;
    --bg-elev: rgba(255,255,255,.03);
    --text: #f4efe7;
    --muted: #a29b91;
    --faint: #615d57;
    --accent: #d0a15d;
    --accent-2: #84a7ff;
    --border: rgba(255,255,255,.10);
    --shadow: 0 24px 80px rgba(0,0,0,.35);
    --width: 1140px;
    --content: 760px;
    --radius: 18px;
  }

  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    color:var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height:1.65;
    background:
      radial-gradient(circle at 20% 0%, rgba(208,161,93,.12), transparent 26%),
      radial-gradient(circle at 80% 15%, rgba(132,167,255,.08), transparent 22%),
      linear-gradient(180deg, #090909 0%, #050505 100%);
    min-height:100vh;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size: 72px 72px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,0) 80%);
    opacity:.35;
  }

  a{color:var(--text);text-decoration:none}
  a:hover{color:var(--accent)}

  .frame{
    width:min(calc(100% - 2rem), var(--width));
    margin:0 auto;
    position:relative;
    z-index:1;
  }

  .site-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:1.5rem;
    padding:1.75rem 0 1.2rem;
    border-bottom:1px solid var(--border);
    margin-bottom:2.25rem;
  }

  .brand{
    display:flex;
    flex-direction:column;
    gap:.35rem;
  }

  .brand a{
    font-size:1rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--text);
  }

  .brand small{
    color:var(--muted);
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:.74rem;
  }

  nav{
    display:flex;
    flex-wrap:wrap;
    gap:1.1rem;
    justify-content:flex-end;
  }

  nav a{
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.1em;
    font-size:.76rem;
    position:relative;
  }

  nav a:hover,
  nav a.active{
    color:var(--text);
  }

  nav a.active::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:-.5rem;
    height:1px;
    background:var(--accent);
  }

  main{
    padding:0 0 3rem;
    min-height:62vh;
  }

  .hero{
    display:grid;
    grid-template-columns:minmax(0,1.4fr) minmax(300px,.8fr);
    gap:2rem;
    align-items:end;
    margin:2rem 0 3rem;
  }

  .eyebrow,
  .meta,
  .kicker{
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.14em;
    font-size:.74rem;
  }

  h1{
    margin:0;
    font-size:clamp(2.5rem, 6vw, 5.2rem);
    line-height:.94;
    letter-spacing:-.05em;
    text-wrap:balance;
  }

  h2{
    margin:0;
    font-size:clamp(1.4rem, 2vw, 2rem);
    line-height:1.15;
    letter-spacing:-.03em;
  }

  h3{
    margin:0 0 .6rem;
    font-size:1.05rem;
    letter-spacing:-.02em;
  }

  p{margin:0 0 1rem}

  .lede{
    color:var(--muted);
    font-size:1.05rem;
    max-width:36rem;
    margin-top:1rem;
  }

  .hero-panel,
  .card,
  .panel{
    background:var(--bg-elev);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }

  .hero-panel{
    padding:1.25rem;
    backdrop-filter: blur(10px);
  }

  .hero-panel .kicker{margin-bottom:.75rem}

  .hero-art{
    display:grid;
    gap:.8rem;
  }

  .hero-art .art-slab,
  .hero-art .art-image{
    border-radius:calc(var(--radius) - 4px);
    border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(135deg, rgba(208,161,93,.18), rgba(132,167,255,.12));
    min-height:140px;
    position:relative;
    overflow:hidden;
  }

  .hero-art .art-image{
    min-height:260px;
    background-size:cover;
    background-position:center;
    background-image:linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.45)), var(--hero-image, linear-gradient(135deg, rgba(208,161,93,.45), rgba(132,167,255,.18)));
  }

  .hero-art .art-slab{
    min-height:120px;
    background-size:cover;
    background-position:center;
  }

  .art-placeholder{
    position:absolute;
    inset:auto 0 0 0;
    padding:.7rem .85rem;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.65));
    color:var(--muted);
    font-size:.72rem;
    letter-spacing:.12em;
    text-transform:uppercase;
  }

  .stack{display:grid;gap:1rem}

  .section-head{
    display:flex;
    justify-content:space-between;
    gap:1rem;
    align-items:end;
    margin:0 0 1rem;
  }

  .section-head .meta{margin:0}

  .grid{
    display:grid;
    grid-template-columns:repeat(12,minmax(0,1fr));
    gap:1rem;
  }

  .entry-card{
    grid-column:span 6;
    padding:1.1rem;
    min-height:100%;
  }

  .entry-card a.title-link{display:inline-block}

  .entry-card .meta{margin:.65rem 0 .8rem}

  .entry-card .summary{color:var(--muted);margin:0}

  .card{
    padding:1.1rem;
  }

  .gallery-card-preview{
    aspect-ratio:4 / 3;
    width:100%;
    border-radius:calc(var(--radius) - 6px);
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(135deg, rgba(208,161,93,.18), rgba(132,167,255,.12));
    margin-bottom:.9rem;
    position:relative;
  }

  .gallery-card-preview img,
  .gallery-card-preview video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .gallery-card-placeholder,
  .media-hint{
    display:grid;
    place-items:center;
    min-height:100%;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.14em;
    font-size:.72rem;
    text-align:center;
    padding:1rem;
  }

  .card-media{
    aspect-ratio: 4 / 3;
    width:100%;
    object-fit:cover;
    border-radius:calc(var(--radius) - 6px);
    border:1px solid rgba(255,255,255,.08);
    background:#111;
    display:block;
  }

  .content-body > * + *{margin-top:1rem}

  .gallery{
    display:grid;
    grid-template-columns:repeat(12,minmax(0,1fr));
    gap:1rem;
    margin:1.5rem 0 2rem;
  }

  .gallery figure{
    grid-column:span 6;
    margin:0;
  }

  .gallery img,
  .gallery video{
    width:100%;
    display:block;
    border-radius:var(--radius);
    border:1px solid var(--border);
    background:#111;
  }

  .gallery video{
    aspect-ratio: 4 / 3;
    object-fit:cover;
  }

  .gallery figcaption{
    margin-top:.55rem;
    color:var(--muted);
    font-size:.82rem;
  }

  .content{
    max-width:var(--content);
    font-size:1.03rem;
  }

  .content > * + *{margin-top:1rem}

  .content a{color:var(--accent)}
  .content h2,
  .content h3{margin-top:2rem}
  .content ul,
  .content ol{padding-left:1.25rem}

  .back-link{
    display:inline-flex;
    align-items:center;
    gap:.4rem;
    margin-top:2rem;
    color:var(--muted);
  }

  .back-link:hover{color:var(--text)}

  footer{
    display:flex;
    justify-content:space-between;
    gap:1rem;
    padding:1.2rem 0 2rem;
    border-top:1px solid var(--border);
    color:var(--faint);
    font-size:.78rem;
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  .hero-note{
    display:flex;
    gap:1rem;
    flex-wrap:wrap;
    margin-top:1rem;
    color:var(--muted);
    font-size:.92rem;
  }

  .hero-note span{
    padding:.45rem .7rem;
    border:1px solid var(--border);
    border-radius:999px;
    background:rgba(255,255,255,.02);
  }

  @media (max-width: 920px){
    .hero{grid-template-columns:1fr}
    .entry-card{grid-column:span 12}
    .gallery figure{grid-column:span 12}
  }

  @media (max-width: 680px){
    .site-header{flex-direction:column;align-items:flex-start}
    nav{justify-content:flex-start}
    .frame{width:min(calc(100% - 1.25rem), var(--width))}
    footer{flex-direction:column}
    h1{letter-spacing:-.04em}
  }
</style>
