<style>
  :root{
    color-scheme: dark;
    --bg: #080807;
    --bg-elev: rgba(255,255,255,.022);
    --text: #f2eee7;
    --muted: #aaa39a;
    --faint: #69645e;
    --accent: #c8a46c;
    --accent-2: #c8a46c;
    --border: rgba(255,255,255,.095);
    --shadow: 0 18px 52px rgba(0,0,0,.24);
    --width: 1140px;
    --content: 760px;
    --radius: 18px;
  }

  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    color:var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height:1.65;
    background:#080807;
    min-height:100vh;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size: 96px 96px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,0) 70%);
    opacity:.18;
  }

  a{color:var(--text);text-decoration:none}
  a:hover{color:var(--accent)}
  button:focus-visible,
  a:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:3px;
  }

  .frame{
    width:min(calc(100% - 2rem), var(--width));
    margin:0 auto;
    position:relative;
    z-index:1;
  }

  .site-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:1.5rem;
    padding:1.75rem 0 1.2rem;
    border-bottom:1px solid var(--border);
    margin-bottom:2.25rem;
  }

  .brand{
    display:flex;
    flex-direction:column;
    gap:.35rem;
  }

  .brand a{
    font-size:1rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--text);
  }

  .brand small{
    color:var(--muted);
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:.74rem;
  }

  nav{
    display:flex;
    flex-wrap:wrap;
    gap:1.1rem;
    justify-content:flex-end;
  }

  nav a{
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.1em;
    font-size:.76rem;
    position:relative;
  }

  nav a:hover,
  nav a.active{
    color:var(--text);
  }

  nav a.active::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:-.5rem;
    height:1px;
    background:var(--accent);
  }

  main{
    padding:0 0 3rem;
    min-height:62vh;
  }

  .hero{
    display:grid;
    grid-template-columns:minmax(0,1.4fr) minmax(300px,.8fr);
    gap:2rem;
    align-items:end;
    margin:2rem 0 3rem;
  }

  .eyebrow,
  .meta,
  .kicker{
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.14em;
    font-size:.74rem;
  }

  h1{
    margin:0;
    font-size:clamp(2.5rem, 6vw, 5.2rem);
    line-height:.94;
    letter-spacing:-.05em;
    text-wrap:balance;
  }

  h2{
    margin:0;
    font-size:clamp(1.4rem, 2vw, 2rem);
    line-height:1.15;
    letter-spacing:-.03em;
  }

  h3{
    margin:0 0 .6rem;
    font-size:1.05rem;
    letter-spacing:-.02em;
  }

  p{margin:0 0 1rem}

  .lede{
    color:var(--muted);
    font-size:1.05rem;
    max-width:36rem;
    margin-top:1rem;
  }

  .hero-panel,
  .card,
  .panel{
    background:var(--bg-elev);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }

  .hero-panel{
    padding:1.25rem;
    backdrop-filter: blur(10px);
  }

  .hero-panel .kicker{margin-bottom:.75rem}

  .hero-art{
    display:grid;
    gap:.8rem;
  }

  .hero-art .art-slab,
  .hero-art .art-image{
    border-radius:calc(var(--radius) - 4px);
    border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(135deg, rgba(208,161,93,.18), rgba(132,167,255,.12));
    min-height:140px;
    position:relative;
    overflow:hidden;
  }

  .hero-art .art-image{
    min-height:260px;
    background-size:cover;
    background-position:center;
    background-image:linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.45)), var(--hero-image, linear-gradient(135deg, rgba(208,161,93,.45), rgba(132,167,255,.18)));
  }

  .hero-art .art-slab{
    min-height:120px;
    background-size:cover;
    background-position:center;
  }

  .art-placeholder{
    position:absolute;
    inset:auto 0 0 0;
    padding:.7rem .85rem;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.65));
    color:var(--muted);
    font-size:.72rem;
    letter-spacing:.12em;
    text-transform:uppercase;
  }

  .stack{display:grid;gap:1rem}

  .section-head{
    display:flex;
    justify-content:space-between;
    gap:1rem;
    align-items:end;
    margin:0 0 1rem;
  }

  .section-head .meta{margin:0}

  .grid{
    display:grid;
    grid-template-columns:repeat(12,minmax(0,1fr));
    gap:1rem;
  }

  .entry-card{
    grid-column:span 6;
    padding:1.1rem;
    min-height:100%;
  }

  .entry-card a.title-link{display:inline-block}

  .entry-card .meta{margin:.65rem 0 .8rem}

  .entry-card .summary{color:var(--muted);margin:0}

  .card{
    padding:1.1rem;
  }

  .gallery-card-link{
    display:block;
    color:inherit;
    text-decoration:none;
    cursor:pointer;
  }

  .gallery-card-link:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:3px;
    border-radius:calc(var(--radius) - 6px);
  }

  .gallery-card-preview{
    aspect-ratio:4 / 3;
    width:100%;
    border-radius:calc(var(--radius) - 6px);
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(135deg, rgba(208,161,93,.18), rgba(132,167,255,.12));
    margin-bottom:.9rem;
    position:relative;
  }

  .gallery-card-preview.exhibition-card-preview{
    background:linear-gradient(135deg, rgba(208,161,93,.10), rgba(255,255,255,.04));
  }

  .gallery-card-preview img,
  .gallery-card-preview video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .gallery-card-placeholder,
  .media-hint{
    display:grid;
    place-items:center;
    min-height:100%;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.14em;
    font-size:.72rem;
    text-align:center;
    padding:1rem;
  }

  .card-media{
    aspect-ratio: 4 / 3;
    width:100%;
    object-fit:cover;
    border-radius:calc(var(--radius) - 6px);
    border:1px solid rgba(255,255,255,.08);
    background:#111;
    display:block;
  }

  .content-body > * + *{margin-top:1rem}

  .gallery{
    display:grid;
    grid-template-columns:repeat(12,minmax(0,1fr));
    gap:1rem;
    margin:1.5rem 0 2rem;
  }

  .gallery.exhibition-media{
    gap:.85rem;
  }

  .gallery figure{
    grid-column:span 6;
    margin:0;
  }

  .gallery.exhibition-media figure{
    grid-column:span 4;
  }

  .gallery.exhibition-media .exhibition-featured{
    grid-column:1 / -1;
  }

  .gallery.exhibition-media .lightbox-trigger{
    aspect-ratio:4 / 3;
    overflow:hidden;
    border-radius:var(--radius);
    border:1px solid var(--border);
  }

  .gallery.exhibition-media .exhibition-featured .lightbox-trigger{
    aspect-ratio:16 / 9;
  }

  .gallery.exhibition-media .lightbox-trigger img,
  .gallery.exhibition-media .lightbox-trigger video{
    height:100%;
    object-fit:cover;
    border:0;
    border-radius:0;
  }

  .lightbox-item{position:relative}

  .lightbox-trigger{
    padding:0;
    border:0;
    background:none;
    text-align:left;
    cursor:zoom-in;
    position:relative;
    width:100%;
    display:block;
  }

  .lightbox-trigger img,
  .gallery video{
    width:100%;
    display:block;
    border-radius:var(--radius);
    border:1px solid var(--border);
    background:#111;
  }

  .lightbox-trigger img{display:block}

  .lightbox-hint{
    position:absolute;
    right:.75rem;
    bottom:.75rem;
    padding:.35rem .55rem;
    border-radius:999px;
    background:rgba(0,0,0,.62);
    border:1px solid rgba(255,255,255,.12);
    color:var(--text);
    font-size:.68rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    pointer-events:none;
  }

  .gallery video{
    aspect-ratio: 4 / 3;
    object-fit:cover;
  }

  .gallery figcaption{
    margin-top:.55rem;
    color:var(--muted);
    font-size:.82rem;
  }

  .gallery figcaption strong,
  .gallery figcaption span{
    display:block;
  }

  .gallery figcaption strong{
    color:var(--text);
    font-weight:500;
  }

  .media-instructions{
    color:var(--faint);
    font-size:.78rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin:1.25rem 0 -.25rem;
  }

  .lightbox{
    position:fixed;
    inset:0;
    z-index:999;
    display:grid;
    place-items:center;
    padding:1rem;
  }

  .lightbox[hidden]{display:none}

  .lightbox-backdrop{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.82);
    backdrop-filter:blur(8px);
  }

  .lightbox-dialog{
    position:relative;
    z-index:1;
    margin:0;
    width:min(96vw, 1280px);
    max-height:92vh;
    display:grid;
    gap:.75rem;
  }

  .lightbox-stage{
    display:grid;
    place-items:center;
    min-width:0;
    touch-action:none;
  }

  .lightbox-shell{
    position:relative;
    width:var(--fit-width, min(96vw, 1280px));
    height:var(--fit-height, min(84vh, 84vh));
    max-width:100%;
    max-height:84vh;
    overflow:hidden;
    display:grid;
    place-items:center;
    border-radius:calc(var(--radius) - 4px);
    background:#111;
    cursor:grab;
    touch-action:none;
  }

  .lightbox-shell.is-zoomed{cursor:move}

  .lightbox-topbar,
  .lightbox-toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
  }

  .lightbox-topbar{
    padding:0 .25rem;
  }

  .lightbox-toolbar{
    padding:0 .25rem;
  }

  .lightbox-nav{
    border:1px solid var(--border);
    background:rgba(0,0,0,.58);
    color:var(--text);
    padding:.7rem 1rem;
    border-radius:999px;
    cursor:pointer;
    font-size:.78rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    transition:border-color .15s ease, background-color .15s ease, opacity .15s ease;
  }

  .lightbox-nav:hover:not(:disabled){
    border-color:rgba(255,255,255,.22);
    background:rgba(0,0,0,.72);
  }

  .lightbox-nav:disabled{
    opacity:.2;
    cursor:default;
  }

  .lightbox-prev,
  .lightbox-next{
    min-width:8.5rem;
  }

  .lightbox-image,
  .lightbox-video{
    width:100%;
    max-height:84vh;
    object-fit:contain;
    display:block;
    border-radius:calc(var(--radius) - 4px);
    box-shadow:var(--shadow);
    background:#111;
  }

  .lightbox-shell .lightbox-image{
    width:100%;
    height:100%;
    max-width:none;
    max-height:none;
    object-fit:contain;
    transform:translate(var(--pan-x, 0px), var(--pan-y, 0px)) scale(var(--zoom, 1));
    transform-origin:center center;
    will-change:transform;
    user-select:none;
    -webkit-user-drag:none;
    cursor:inherit;
  }

  .lightbox-shell .lightbox-image.zoomable{
    cursor:grab;
  }

  .lightbox-shell.is-zoomed .lightbox-image.zoomable{
    cursor:move;
  }

  .lightbox-caption,
  .lightbox-help{
    margin:0;
    color:var(--muted);
    text-align:center;
    font-size:.95rem;
  }

  .lightbox-help{
    color:var(--faint);
    font-size:.72rem;
    letter-spacing:.12em;
    text-transform:uppercase;
  }

  .lightbox-counter{
    color:var(--muted);
    text-align:center;
    font-size:.75rem;
    letter-spacing:.16em;
    text-transform:uppercase;
  }

  .lightbox-close{
    border:1px solid var(--border);
    background:rgba(0,0,0,.58);
    color:var(--text);
    width:2.4rem;
    height:2.4rem;
    border-radius:999px;
    font-size:1.25rem;
    line-height:1;
    cursor:pointer;
    display:grid;
    place-items:center;
    transition:border-color .15s ease, background-color .15s ease, opacity .15s ease;
  }

  .lightbox-close:hover{
    border-color:rgba(255,255,255,.22);
    background:rgba(0,0,0,.72);
  }

  body.lightbox-open{overflow:hidden}

  .content{
    max-width:var(--content);
    font-size:1.03rem;
  }

  .content > * + *{margin-top:1rem}

  .content a{color:var(--accent)}
  .content h2,
  .content h3{margin-top:2rem}
  .content ul,
  .content ol{padding-left:1.25rem}

  .back-link{
    display:inline-flex;
    align-items:center;
    gap:.4rem;
    margin-top:2rem;
    color:var(--muted);
  }

  .back-link:hover{color:var(--text)}

  footer{
    display:flex;
    justify-content:space-between;
    gap:1rem;
    padding:1.2rem 0 2rem;
    border-top:1px solid var(--border);
    color:var(--faint);
    font-size:.78rem;
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  .hero-note{
    display:flex;
    gap:1rem;
    flex-wrap:wrap;
    margin-top:1rem;
    color:var(--muted);
    font-size:.92rem;
  }

  .hero-note span{
    padding:.45rem .7rem;
    border:1px solid var(--border);
    border-radius:999px;
    background:rgba(255,255,255,.02);
  }

  @media (max-width: 920px){
    .hero{grid-template-columns:1fr;gap:1.25rem;margin:1.5rem 0 2rem}
    .hero > :first-child{order:2}
    .hero-panel{order:1;padding:1rem}
    .hero-art .art-image{min-height:220px}
    .hero-art .art-slab{min-height:96px}
    .entry-card{grid-column:span 12}
    .gallery figure{grid-column:span 12}
    .gallery.exhibition-media figure{grid-column:span 12}
    .gallery.exhibition-media .exhibition-featured{grid-column:span 12}
  }

  @media (max-width: 680px){
    .site-header{flex-direction:column;align-items:flex-start}
    nav{justify-content:flex-start}
    .frame{width:min(calc(100% - 1.25rem), var(--width))}
    footer{flex-direction:column}
    h1{font-size:clamp(2rem, 12vw, 3rem);letter-spacing:-.04em}
    .lede{font-size:.96rem;max-width:none;margin-top:.85rem}
    .hero-note{display:none}
    .hero-panel{padding:.9rem}
    .hero-art{gap:.65rem}
    .hero-art .art-image{min-height:190px}
    .hero-art .art-slab{min-height:84px}
    .section-head{flex-direction:column;align-items:flex-start}
    .grid{gap:.8rem}
    .entry-card{padding:.95rem}
    .card{padding:.95rem}
    .gallery-card-preview{margin-bottom:.7rem}
    .lightbox-toolbar{flex-direction:column;align-items:stretch}
    .lightbox-nav{width:100%}
    .lightbox-counter{text-align:left}
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{
      scroll-behavior:auto!important;
      transition-duration:.01ms!important;
      animation-duration:.01ms!important;
      animation-iteration-count:1!important;
    }
  }
</style>
