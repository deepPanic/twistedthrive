backend:
  name: github
  repo: deepPanic/twistedthrive
  branch: main
  base_url: https://thrive.localh0st.co.uk
  auth_endpoint: oauth/auth

site_url: https://thrive.localh0st.co.uk
media_folder: static/images
public_folder: /images
publish_mode: editorial_workflow

collections:
  - name: homepage
    label: Homepage
    files:
      - file: data/homepage.toml
        label: Homepage settings
        name: homepage
        fields:
          - {label: Spotlight Label, name: spotlight_label, widget: string, required: false}
          - {label: Spotlight Title, name: spotlight_title, widget: string, required: false}
          - {label: Spotlight Copy, name: spotlight_copy, widget: text, required: false}
          - {label: Spotlight Image, name: spotlight_image, widget: image, required: false}
          - {label: Detail Image, name: detail_image, widget: image, required: false}
          - {label: Intro, name: intro, widget: text, required: false}

  - name: exhibitions
    label: Exhibitions
    label_singular: Exhibition
    description: Shows, visits, collaborations, and contexts the artist is involved in or documenting.
    folder: content/exhibitions
    create: true
    slug: "{{slug}}"
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Exhibition Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD}
      - {label: Description, name: description, widget: text, required: false}
      - {label: Featured Image, name: featured_image, widget: image, required: false}
      - {label: Gallery Images, name: images, widget: list, field: {label: Image, name: image, widget: image}, required: false}
      - {label: Body, name: body, widget: markdown}

  - name: journal
    label: Journal
    folder: content/journal
    create: true
    slug: "{{slug}}"
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Publish Date, name: date, widget: date}
      - {label: Featured Image, name: featured_image, widget: image, required: false}
      - {label: Body, name: body, widget: markdown}

  - name: pages
    label: Pages
    files:
      - file: content/about.md
        label: About
        name: about
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Body, name: body, widget: markdown}
      - file: content/gallery/_index.md
        label: Gallery Index
        name: gallery-index
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Description, name: description, widget: text, required: false}
          - {label: Body, name: body, widget: markdown, required: false}

  - name: gallery
    label: Gallery
    label_singular: Work / series
    description: Artist's own work and image/video series. Create one folder page per work, series, or archive grouping.
    folder: content/gallery
    path: "{{slug}}/index"
    create: true
    media_folder: ""
    public_folder: ""
    slug: "{{slug}}"
    fields:
      - {label: Title, name: title, widget: string, required: false, hint: "Leave blank to use the folder name on the site"}
      - {label: Description, name: description, widget: text, required: false}
      - label: Gallery Media
        name: gallery_items
        widget: list
        required: false
        summary: "{{fields.title}} {{fields.year}} — {{fields.media}}"
        fields:
          - {label: Media, name: media, widget: file}
          - {label: Artwork/item title, name: title, widget: string, required: false}
          - {label: Year, name: year, widget: string, required: false}
          - {label: Medium, name: medium, widget: string, required: false, hint: "Example: Oil on canvas, digital image, video, installation detail"}
          - {label: Dimensions, name: dimensions, widget: string, required: false}
          - {label: Alt text, name: alt, widget: string, required: false, hint: "Short visual description for accessibility"}
          - {label: Caption/note, name: caption, widget: string, required: false}
      - {label: Body, name: body, widget: markdown, required: false}
